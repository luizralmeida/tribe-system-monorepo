services:
  tribe-mysql:
    image: mysql:8.0
    container_name: tribe-mysql
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: tribe_root_pass
      MYSQL_DATABASE: tribe_db
      MYSQL_USER: tribe_user
      MYSQL_PASSWORD: tribe_pass
    volumes:
      - tribe_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tribe_mysql_data:
    driver: local
