      MYSQL_DATABASE: tribe_db
      MYSQL_USER: tribe_user
      MYSQL_PASSWORD: siT&3p4;4,\7<.IbF=r0wMwVML<Y0>~s&Ps
    volumes:
      - mysql_data:/var/lib/mysql

  tribe-api:
    build: 
      context: ./apps/tribe-api # O Docker "entra" nesta pasta para buildar
